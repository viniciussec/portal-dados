services:
  app:
    container_name: nextjs_app_dev
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: npm run dev